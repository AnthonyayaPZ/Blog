<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>霙樱怪的个人博客</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;500;700&family=Noto+Sans+SC:wght@300;400;500&family=Playfair+Display:ital,wght@0,700;1,400&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body data-page="home">
    <nav>
      <a class="nav-logo" href="#" data-nav-home>霙樱怪的个人博客</a>
      <div class="nav-links">
        <a href="#" data-nav-link="all">主页</a>
        <a href="#" data-nav-link="ai">AI日报</a>
        <a href="#" data-nav-link="paper">科研论文</a>
        <a href="#" data-nav-link="essay">随笔杂谈</a>
        <a href="./tags.html">标签</a>
      </div>
      <form class="nav-search" data-search-form>
        <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="8" cy="8" r="5"></circle>
          <path d="M13 13l3 3"></path>
        </svg>
        <input type="text" placeholder="搜索文章…" data-search-input />
      </form>
    </nav>

    <div id="page-home" class="page active">
      <div class="hero">
        <div class="hero-art"></div>
        <div class="hero-overlay"></div>
        <div class="hero-content">
          <div class="hero-title">霙樱怪的个人博客</div>
          <div class="hero-subtitle">思考的印记 · 探索的轨迹</div>
        </div>
      </div>

      <main class="main">
        <div class="category-tabs">
          <button class="tab-btn active" data-tab-btn="all">全部</button>
          <button class="tab-btn" data-tab-btn="ai">AI日报</button>
          <button class="tab-btn" data-tab-btn="paper">科研论文</button>
          <button class="tab-btn" data-tab-btn="essay">随笔杂谈</button>
        </div>

        <div class="status-bar" data-status></div>
        <div class="post-list" id="post-list"></div>
      </main>
    </div>

    <footer class="footer">© 2026 霙樱怪的个人博客 · 保留所有权利</footer>

    <script src="./site.config.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
