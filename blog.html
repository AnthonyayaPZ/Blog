<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>霙樱怪的个人博客</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;500;700&family=Noto+Sans+SC:wght@300;400;500&family=Playfair+Display:ital,wght@0,700;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f8f6f2;
    --text: #1a1a1a;
    --text-muted: #888;
    --accent: #7a9eb5;
    --accent-warm: #c4956a;
    --accent-soft: #a8c4b8;
    --border: #e0dbd3;
    --card-bg: #ffffff;
    --hero-overlay: rgba(10,20,30,0.35);
    --nav-bg: rgba(248,246,242,0.92);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Noto Sans SC', sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.7;
  }

  /* ─── NAV ─── */
  nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    background: var(--nav-bg);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 40px; height: 56px;
  }
  .nav-logo {
    font-family: 'Noto Serif SC', serif;
    font-size: 18px; font-weight: 700;
    color: var(--text); text-decoration: none;
    letter-spacing: 0.05em;
  }
  .nav-links { display: flex; gap: 32px; }
  .nav-links a {
    font-size: 13px; color: var(--text-muted);
    text-decoration: none; letter-spacing: 0.08em;
    transition: color 0.2s;
  }
  .nav-links a:hover { color: var(--accent); }
  .nav-search {
    display: flex; align-items: center;
    border: 1px solid var(--border); border-radius: 20px;
    padding: 4px 14px; gap: 6px; background: white;
  }
  .nav-search input {
    border: none; outline: none; background: transparent;
    font-size: 12px; width: 120px; font-family: inherit;
    color: var(--text);
  }
  .nav-search svg { width: 13px; height: 13px; color: var(--text-muted); flex-shrink: 0; }

  /* ─── HERO ─── */
  .hero {
    position: relative; height: 420px; overflow: hidden;
    margin-top: 56px;
  }
  .hero-bg {
    width: 100%; height: 100%; object-fit: cover;
    background: linear-gradient(135deg, #a8c5da 0%, #7fafc8 20%, #5d9ab5 40%, #8bb8a8 60%, #6ea891 80%, #4a8a70 100%);
    display: flex; align-items: flex-end; justify-content: center;
  }
  /* Anime-style illustrated sky using CSS */
  .hero-art {
    position: absolute; inset: 0;
    background:
      radial-gradient(ellipse 60% 40% at 30% 30%, rgba(255,255,255,0.6) 0%, transparent 60%),
      radial-gradient(ellipse 40% 30% at 70% 20%, rgba(255,255,255,0.5) 0%, transparent 50%),
      linear-gradient(180deg, #b8d4e8 0%, #8fbdd6 30%, #6fa8c2 50%, #5a9980 70%, #4a7d65 90%, #3d6b54 100%);
  }
  /* Clouds */
  .hero-art::before {
    content: '';
    position: absolute; inset: 0;
    background:
      radial-gradient(ellipse 120px 40px at 15% 25%, rgba(255,255,255,0.8) 0%, transparent 70%),
      radial-gradient(ellipse 80px 30px at 20% 22%, rgba(255,255,255,0.9) 0%, transparent 70%),
      radial-gradient(ellipse 90px 35px at 60% 15%, rgba(255,255,255,0.7) 0%, transparent 70%),
      radial-gradient(ellipse 60px 25px at 66% 12%, rgba(255,255,255,0.8) 0%, transparent 70%),
      radial-gradient(ellipse 70px 28px at 80% 30%, rgba(255,255,255,0.6) 0%, transparent 70%),
      radial-gradient(ellipse 100px 38px at 45% 20%, rgba(255,255,255,0.5) 0%, transparent 70%);
  }
  /* Silhouette */
  .hero-art::after {
    content: '';
    position: absolute; bottom: 0; left: 0; right: 0; height: 50%;
    background:
      radial-gradient(ellipse 40% 80% at 75% 110%, #3a6b4a 0%, transparent 60%),
      radial-gradient(ellipse 30% 60% at 85% 120%, #4a7d5a 0%, transparent 60%),
      radial-gradient(ellipse 25% 50% at 10% 120%, #355f40 0%, transparent 55%);
  }
  .hero-overlay {
    position: absolute; inset: 0;
    background: var(--hero-overlay);
  }
  .hero-content {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    text-align: center; color: white;
  }
  .hero-title {
    font-family: 'Noto Serif SC', serif;
    font-size: clamp(36px, 6vw, 72px);
    font-weight: 700; letter-spacing: 0.12em;
    text-shadow: 0 2px 20px rgba(0,0,0,0.4);
    animation: fadeUp 0.8s ease both;
  }
  .hero-subtitle {
    margin-top: 12px;
    font-size: 14px; font-weight: 300;
    letter-spacing: 0.2em; opacity: 0.85;
    text-shadow: 0 1px 10px rgba(0,0,0,0.3);
    animation: fadeUp 0.8s 0.15s ease both;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* ─── MAIN LAYOUT ─── */
  .main { max-width: 1100px; margin: 0 auto; padding: 56px 40px 100px; }

  /* ─── CATEGORY TABS ─── */
  .category-tabs {
    display: flex; gap: 0; margin-bottom: 40px;
    border-bottom: 2px solid var(--border);
  }
  .tab-btn {
    padding: 10px 28px; font-size: 13px; font-family: inherit;
    background: none; border: none; cursor: pointer;
    color: var(--text-muted); letter-spacing: 0.06em;
    position: relative; transition: color 0.2s;
  }
  .tab-btn::after {
    content: ''; position: absolute;
    bottom: -2px; left: 0; right: 0; height: 2px;
    background: var(--accent); transform: scaleX(0);
    transition: transform 0.25s ease;
  }
  .tab-btn.active { color: var(--accent); }
  .tab-btn.active::after { transform: scaleX(1); }
  .tab-btn:hover { color: var(--text); }

  /* ─── POST LIST ─── */
  .post-list { display: flex; flex-direction: column; gap: 0; }
  .post-item {
    display: flex; align-items: center; gap: 32px;
    padding: 28px 0; border-bottom: 1px solid var(--border);
    text-decoration: none; color: inherit;
    transition: background 0.2s;
    cursor: pointer;
    animation: fadeIn 0.5s ease both;
  }
  .post-item:hover .post-title { color: var(--accent); }
  .post-item:hover .post-cover { transform: scale(1.03); }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .post-info { flex: 1; min-width: 0; }
  .post-category-tag {
    display: inline-block;
    font-size: 10px; letter-spacing: 0.1em;
    color: var(--accent-warm); font-weight: 500;
    margin-bottom: 8px;
    text-transform: uppercase;
  }
  .post-title {
    font-family: 'Noto Serif SC', serif;
    font-size: 20px; font-weight: 500;
    line-height: 1.4; margin-bottom: 10px;
    transition: color 0.2s;
  }
  .post-excerpt {
    font-size: 13px; color: var(--text-muted);
    line-height: 1.6; margin-bottom: 12px;
    display: -webkit-box; -webkit-line-clamp: 2;
    -webkit-box-orient: vertical; overflow: hidden;
  }
  .post-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 10px; }
  .post-tag {
    font-size: 11px; padding: 2px 10px;
    border: 1px solid var(--border);
    border-radius: 20px; color: var(--text-muted);
    letter-spacing: 0.04em;
  }
  .post-meta { font-size: 11px; color: var(--text-muted); letter-spacing: 0.04em; }
  .post-cover-wrap {
    width: 180px; height: 120px; flex-shrink: 0;
    border-radius: 6px; overflow: hidden;
    background: var(--border);
  }
  .post-cover {
    width: 100%; height: 100%;
    object-fit: cover; display: block;
    transition: transform 0.4s ease;
  }
  /* Placeholder covers using gradients */
  .cover-1 { background: linear-gradient(135deg, #a8c5da, #7fafc8 40%, #5a8fa8); }
  .cover-2 { background: linear-gradient(135deg, #d4a8c5, #b87fa8 40%, #8a5a7f); }
  .cover-3 { background: linear-gradient(135deg, #a8d4c5, #7fb8a8 40%, #5a9a80); }
  .cover-4 { background: linear-gradient(135deg, #d4c8a8, #b8aa7f 40%, #9a8a5a); }
  .cover-5 { background: linear-gradient(135deg, #c8a8d4, #a87fb8 40%, #7a5a9a); }
  .cover-6 { background: linear-gradient(135deg, #a8c4d4, #7fa8c0 40%, #5a8aaa); }

  /* ─── ARTICLE PAGE ─── */
  .article-page { display: none; }

  .article-hero {
    position: relative; height: 500px; overflow: hidden;
    margin-top: 56px;
  }
  .article-hero-art {
    position: absolute; inset: 0;
    background: linear-gradient(180deg, #9ac3db 0%, #6fa8c0 35%, #5a9980 60%, #4a7d65 85%, #3d6b54 100%);
  }
  .article-hero-art::before {
    content: '';
    position: absolute; inset: 0;
    background:
      radial-gradient(ellipse 150px 50px at 10% 30%, rgba(255,255,255,0.75) 0%, transparent 70%),
      radial-gradient(ellipse 100px 38px at 16% 26%, rgba(255,255,255,0.85) 0%, transparent 70%),
      radial-gradient(ellipse 80px 32px at 55% 18%, rgba(255,255,255,0.65) 0%, transparent 70%),
      radial-gradient(ellipse 120px 45px at 70% 12%, rgba(255,255,255,0.7) 0%, transparent 70%),
      radial-gradient(ellipse 60px 25px at 85% 28%, rgba(255,255,255,0.6) 0%, transparent 70%);
  }
  .article-hero-art::after {
    content: '';
    position: absolute; bottom: 0; left: 0; right: 0; height: 55%;
    background:
      radial-gradient(ellipse 35% 70% at 72% 115%, #3a6b4a 0%, transparent 55%),
      radial-gradient(ellipse 28% 55% at 88% 120%, #4a7d5a 0%, transparent 55%),
      radial-gradient(ellipse 22% 45% at 8% 120%, #355f40 0%, transparent 50%);
  }
  .article-hero-overlay {
    position: absolute; inset: 0;
    background: linear-gradient(to bottom, rgba(10,20,30,0.2) 0%, rgba(10,20,30,0.55) 100%);
  }
  .article-hero-content {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    align-items: flex-start; justify-content: flex-end;
    padding: 48px 80px 56px;
    color: white; max-width: 900px;
  }
  .article-hero-tags { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
  .article-hero-tag {
    font-size: 11px; padding: 3px 12px;
    border: 1px solid rgba(255,255,255,0.6);
    border-radius: 20px; letter-spacing: 0.06em;
    backdrop-filter: blur(4px);
    background: rgba(255,255,255,0.1);
  }
  .article-hero-title {
    font-family: 'Noto Serif SC', serif;
    font-size: clamp(24px, 4vw, 40px);
    font-weight: 700; line-height: 1.3;
    text-shadow: 0 2px 20px rgba(0,0,0,0.4);
    margin-bottom: 14px;
  }
  .article-hero-subtitle {
    font-size: 14px; font-weight: 300;
    opacity: 0.8; letter-spacing: 0.04em;
    text-shadow: 0 1px 10px rgba(0,0,0,0.3);
    margin-bottom: 16px;
  }
  .article-hero-meta {
    font-size: 12px; opacity: 0.7;
    letter-spacing: 0.06em; display: flex; align-items: center; gap: 6px;
  }

  /* ─── ARTICLE BODY ─── */
  .article-body {
    max-width: 1100px; margin: 0 auto;
    padding: 56px 40px 100px;
    display: grid;
    grid-template-columns: 1fr 240px;
    gap: 64px; align-items: start;
  }
  .article-content { min-width: 0; }
  .article-ai-note {
    text-align: center; font-size: 12px;
    color: var(--text-muted); letter-spacing: 0.06em;
    margin-bottom: 40px; padding-bottom: 24px;
    border-bottom: 1px solid var(--border);
  }
  .article-section-title {
    font-family: 'Noto Serif SC', serif;
    font-size: 22px; font-weight: 500;
    margin: 40px 0 16px;
    display: flex; align-items: center; gap: 12px;
  }
  .article-section-title .num {
    font-size: 13px; color: var(--accent); letter-spacing: 0.08em;
  }
  .article-p {
    font-size: 15px; line-height: 1.9;
    color: #2a2a2a; margin-bottom: 18px;
    text-align: justify;
  }
  .article-blockquote {
    margin: 24px 0; padding: 16px 24px;
    border-left: 3px solid var(--accent);
    background: rgba(122,158,181,0.06);
    font-style: italic; font-size: 14px;
    color: var(--text-muted); line-height: 1.8;
  }

  /* ─── SIDEBAR / CATALOG ─── */
  .article-sidebar { position: sticky; top: 80px; }
  .catalog-title {
    font-size: 11px; letter-spacing: 0.15em; color: var(--text-muted);
    text-transform: uppercase; margin-bottom: 16px;
    padding-bottom: 8px; border-bottom: 1px solid var(--border);
  }
  .catalog-list { list-style: none; }
  .catalog-item {
    font-size: 12px; color: var(--text-muted);
    padding: 5px 0; cursor: pointer;
    border-left: 2px solid transparent;
    padding-left: 10px;
    transition: all 0.2s; letter-spacing: 0.03em;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .catalog-item:hover, .catalog-item.active {
    color: var(--accent);
    border-left-color: var(--accent);
  }
  .catalog-item.sub { padding-left: 22px; font-size: 11px; }

  /* ─── BACK BUTTON ─── */
  .back-btn {
    display: inline-flex; align-items: center; gap: 6px;
    font-size: 12px; color: var(--text-muted);
    background: none; border: none; cursor: pointer;
    font-family: inherit; letter-spacing: 0.06em;
    padding: 8px 0; margin-bottom: 8px;
    transition: color 0.2s;
  }
  .back-btn:hover { color: var(--accent); }

  /* ─── HIDDEN PAGES ─── */
  .page { display: none; }
  .page.active { display: block; }

  /* ─── FOOTER ─── */
  .footer {
    text-align: center; padding: 32px;
    font-size: 11px; color: var(--text-muted);
    letter-spacing: 0.08em;
    border-top: 1px solid var(--border);
  }
</style>
</head>

let currentCat = 'all';

function renderPosts(cat) {
  const list = document.getElementById('post-list');
  const filtered = cat === 'all' ? posts : posts.filter(p => p.cat === cat);
  list.innerHTML = filtered.map((p, i) => `
    <div class="post-item" onclick="showArticle(${p.id})" style="animation-delay:${i*0.07}s">
      <div class="post-info">
        <div class="post-category-tag">${p.catLabel}</div>
        <div class="post-title">${p.title}</div>
        <div class="post-excerpt">${p.excerpt}</div>
        <div class="post-tags">${p.tags.map(t=>`<span class="post-tag">${t}</span>`).join('')}</div>
        <div class="post-meta">${p.author} · ${p.date}</div>
      </div>
      <div class="post-cover-wrap">
        <div class="post-cover ${p.cover}"></div>
      </div>
    </div>
  `).join('');
}

function filterTab(cat) {
  currentCat = cat;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  const map = { all: 0, ai: 1, paper: 2, essay: 3 };
  document.querySelectorAll('.tab-btn')[map[cat]]?.classList.add('active');
  renderPosts(cat);
}

function showArticle(id) {
  const post = posts.find(p => p.id === id);
  if (!post) return;

  // Hero
  document.getElementById('article-hero-content').innerHTML = `
    <button class="back-btn" onclick="showPage('home')">
      <svg width="14" height="14" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2"><path d="M13 5l-5 5 5 5"/></svg>
      返回首页
    </button>
    <div class="article-hero-tags">${post.tags.map(t=>`<span class="article-hero-tag">${t}</span>`).join('')}</div>
    <div class="article-hero-title">${post.title}</div>
    <div class="article-hero-meta">
      <svg width="12" height="12" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 2a6 6 0 100 12A6 6 0 0010 2zm0 0v4m0 0l3 2"/></svg>
      原文由 ${post.author} 发布于 ${post.date}
    </div>
  `;

  // Content
  document.getElementById('article-content').innerHTML =
    `<div class="article-ai-note">（本文包含人工智能辅助生成内容）</div>` +
    post.content.map(block => {
      if (block.type === 'section') return `<h2 class="article-section-title"><span class="num">${block.text.split('、')[0]}、</span>${block.text.split('、')[1] || ''}</h2>`;
      if (block.type === 'p') return `<p class="article-p">${block.text}</p>`;
      if (block.type === 'quote') return `<blockquote class="article-blockquote">${block.text}</blockquote>`;
      return '';
    }).join('');

  // Catalog
  document.getElementById('catalog-list').innerHTML = post.sections.map(s => {
    let html = `<li class="catalog-item" onclick="scrollToSection('${s.title}')">${s.title}</li>`;
    s.sub.forEach(sub => { html += `<li class="catalog-item sub">${sub}</li>`; });
    return html;
  }).join('');

  showPage('article');
}

function showPage(name) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-' + name).classList.add('active');
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function scrollToSection(title) {
  const headings = document.querySelectorAll('.article-section-title');
  for (const h of headings) {
    if (h.textContent.trim().includes(title.replace(/[一二三四五六]、/, ''))) {
      h.scrollIntoView({ behavior: 'smooth', block: 'start' });
      return;
    }
  }
}

// Init
renderPosts('all');
